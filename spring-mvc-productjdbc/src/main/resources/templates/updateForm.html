<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Admin</h2>
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/addForm}">Add Product</a>
        <a th:href="@{/editForm}">Update Product</a>
        <a th:href="@{/deleteForm}">Delete Product</a>
    </aside>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">
            <span>Edit Product</span>
            <a th:href="@{/logout}">Logout</a>
        </div>

        <!-- Content -->
        <div class="content">

            <div class="card">

                <h2 style="margin-bottom: 16px;">Update Product</h2>

                <form th:action="@{/updateProduct}" th:object="${product}" method="post">

                    <label>Product ID</label>
                    <input type="text" th:field="*{prodId}" readonly />

                    <label>Name</label>
                    <input type="text" th:field="*{prodName}" />

                    <label>Price</label>
                    <input type="number" step="0.01" th:field="*{prodPrice}" />

                    <label>Brand</label>
                    <input type="text" th:field="*{prodBrand}" />

                    <label>Category</label>
                    <input type="text" th:field="*{prodCategory}" />

                    <button type="submit">Update Product</button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
