<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

    <div style="text-align:right"><a th:href="@{/login}">Admin</a></div>

    <h1>Product Catlog : </h1>



    <!-- SPRING SEARCH FORM -->

<div class="search-box">

    <form th:action="@{/search}"  method="post">

        <label>Search by Brand</label>

        <input type="text" name="prodBrand" placeholder="Apple, Samsung">

        <button type="submit">Search</button>
    </form>

</div>


<div class="table-container">

    <table id="productTable" class="display">

        <thead>
        <tr>
            <th>Product Id</th>
            <th>Product</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Price</th>

        </tr>
        </thead>

        <tbody>

        <tr th:each="p : ${prodList}">

            <td th:text="${p.prodId}"></td>

            <td th:text="${p.prodName}"></td>

            <td th:text="${p.prodBrand}"></td>

            <td>
                <span class="badge" th:text="${p.prodCategory}"></span>
            </td>

            <td class="price">$ <span th:text="${p.prodPrice}"></span></td>

        </tr>

        </tbody>

    </table>

</div>



</body>
</html>
