<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Admin</h2>
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/addForm}">Add Product</a>
        <a th:href="@{/editForm}">Update Product</a>
        <a th:href="@{/deleteForm}">Delete Product</a>
    </aside>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">
            <span>Dashboard</span>
            <a th:href="@{/logout}">Logout</a>
        </div>

        <!-- Content -->
        <div class="content">

            <div class="card">

                <h2 style="margin-bottom: 16px;">Products</h2>

                <p th:text="${msg}"></p>

                <table>

                    <thead>
                    <tr>
                        <th>Product Id</th>
                        <th>Product</th>
                        <th>Brand</th>
                        <th>Category</th>
                        <th>Price</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="p : ${prodList}">
                        <td th:text="${p.prodId}"></td>
                        <td th:text="${p.prodName}"></td>
                        <td th:text="${p.prodBrand}"></td>
                        <td>
                            <span class="badge" th:text="${p.prodCategory}"></span>
                        </td>
                        <td>$ <span th:text="${p.prodPrice}"></span></td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>
</html>
